<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Tailwind 4.2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.2"></script>
    
    <style type="text/css">
        @theme {
            /* Personalización rápida estilo v4 */
            --color-custom-neon: #ccff00;
        }
    </style>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen">

    <div class="relative group">
        <div class="absolute -inset-1 bg-gradient-to-r from-custom-neon to-cyan-400 rounded-2xl blur opacity-25 group-hover:opacity-75 transition duration-1000"></div>
        
        <div class="relative bg-slate-900 px-8 py-10 rounded-2xl border border-slate-800 leading-none flex items-center divide-x divide-slate-700">
            <div class="pr-6">
                <span class="text-cyan-400 font-mono text-sm">v4.2 Status:</span>
                <h2 class="text-2xl font-bold mt-2">¡Funciona! 🚀</h2>
            </div>
            <div class="pl-6 text-custom-neon font-medium">
                Engine: Oxide
            </div>
        </div>
    </div>

    <div class="fixed bottom-4 right-4 bg-slate-800 px-3 py-1 rounded-full text-xs font-mono text-slate-400">
        <span class="sm:hidden text-orange-400">XS</span>
        <span class="hidden sm:inline md:hidden text-green-400">SM</span>
        <span class="hidden md:inline lg:hidden text-blue-400">MD</span>
        <span class="hidden lg:inline text-purple-400">LG +</span>
    </div>

</body>
</html>
